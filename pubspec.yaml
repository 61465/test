name: alamna
description: عالمنا الخاص - تطبيق للزوجين
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  uuid: ^4.2.1
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
