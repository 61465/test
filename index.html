<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع جديد | 61465</title>
    <style>
        /* تنسيق الألوان: أسود وذهبي */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border: 2px solid #d4af37; /* لون ذهبي */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            background: linear-gradient(145deg, #1a1a1a, #000000);
        }

        h1 {
            color: #d4af37;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.2rem;
            color: #cccccc;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #d4af37;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #f1c40f;
            transform: scale(1.05);
            box-shadow: 0 0 15px #d4af37;
        }

        /* لمسة جمالية متحركة */
        .glow {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; text-shadow: 0 0 10px #d4af37; }
            100% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="glow">مرحباً بك في مشروعي</h1>
        <p>تم إنشاء هذا الموقع بنجاح على GitHub.</p>
        <p>جاري العمل على تطوير ميزات خرافية قريباً...</p>
        <a href="https://github.com/61465" class="btn">عرض ملفي الشخصي</a>
    </div>

</body>
</html>
