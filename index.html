<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Zone Chat | مجتمع الأساطير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #161b22;
            --accent: #00f2ff;
            --gold: #ffcc00;
            --text: #e6edf3;
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: rgba(11, 14, 20, 0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        header { background: var(--panel); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { background: #21262d; padding: 12px 18px; border-radius: 15px; max-width: 80%; align-self: flex-start; border: 1px solid #30363d; }
        .msg-info { font-size: 0.8rem; margin-bottom: 5px; display: flex; gap: 10px; font-weight: bold; }
        .rank-legend { color: var(--gold); font-weight: 900; text-shadow: 0 0 10px rgba(255, 204, 0, 0.6); animation: goldGlow 1.5s infinite alternate; }
        .rank-royal { color: #a371f7; }
        .rank-veteran { color: var(--accent); }
        .rank-new { color: #8b949e; }
        @keyframes goldGlow { from { text-shadow: 0 0 5px var(--gold); } to { text-shadow: 0 0 15px var(--gold), 0 0 25px #ffa500; } }
        .input-box { background: var(--panel); padding: 20px; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 10px; color: white; outline: none; }
        button { background: var(--accent); color: black; border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color: var(--accent);">GAME ZONE</h1>
        <p>ادخل اسمك لتبدأ رحلة الرتب الملكية</p>
        <input type="text" id="username" placeholder="اسمك المستعار..." style="width: 80%; margin-bottom: 20px;">
        <br>
        <button onclick="joinChat()">دخول الغرفة</button>
    </div>
</div>

<header>
    <div style="font-size: 1.5rem; font-weight: 900; letter-spacing: 2px;">GAME ZONE <span style="color: var(--accent);">CHAT</span></div>
    <div id="user-badge">جاري التحقق..</div>
</header>

<div id="chat-container"></div>

<div class="input-box">
    <input type="text" id="msg-input" placeholder="اكتب شيئاً للأساطير...">
    <button onclick="sendMessage()">إرسال</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
    // إعداداتك الخاصة التي أرفقتها
    const firebaseConfig = {
        apiKey: "AIzaSyBqu1IE24FhA-govU_swQ4IcynOj4AB-ao",
        authDomain: "game-zone-chat1.firebaseapp.com",
        projectId: "game-zone-chat1",
        storageBucket: "game-zone-chat1.firebasestorage.app",
        messagingSenderId: "932733239188",
        appId: "1:932733239188:web:634fbfc00a396c761a1981"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let myProfile = null;

    function getRank(joinDate, lastActive) {
        const now = Date.now();
        const daysRegistered = (now - joinDate) / (1000 * 60 * 60 * 24);
        const daysSinceLastActive = (now - lastActive) / (1000 * 60 * 60 * 24);
        if (daysSinceLastActive > 5) return { name: "منقطع 😴", class: "rank-new" };
        if (daysRegistered >= 90) return { name: "أسطورة GZ 👑", class: "rank-legend" };
        if (daysRegistered >= 30) return { name: "عضو ملكي 🥇", class: "rank-royal" };
        return { name: "لاعب جديد 🥚", class: "rank-new" };
    }

    async function joinChat() {
        const name = document.getElementById('username').value;
        if (!name) return alert("الاسم مطلوب!");

        const userCred = await firebase.auth().signInAnonymously();
        const uid = userCred.user.uid;
        const userRef = db.collection('users').doc(uid);
        const doc = await userRef.get();

        if (!doc.exists()) {
            myProfile = { uid, name, joinDate: Date.now(), lastActive: Date.now() };
            await userRef.set(myProfile);
        } else {
            myProfile = doc.data();
            await userRef.update({ lastActive: Date.now() });
        }

        document.getElementById('login-screen').style.display = 'none';
        displayBadge();
        listenToMessages();
    }

    function displayBadge() {
        const rank = getRank(myProfile.joinDate, myProfile.lastActive);
        document.getElementById('user-badge').innerHTML = `<span class="${rank.class}">${rank.name} | ${myProfile.name}</span>`;
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        if (!input.value) return;
        const rank = getRank(myProfile.joinDate, Date.now());
        await db.collection('messages').add({
            name: myProfile.name,
            text: input.value,
            rankName: rank.name,
            rankClass: rank.class,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    function listenToMessages() {
        db.collection('messages').orderBy('createdAt', 'asc').limitToLast(50)
            .onSnapshot(snap => {
                const container = document.getElementById('chat-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const div = document.createElement('div');
                    div.className = 'message';
                    div.innerHTML = `<div class="msg-info"><span class="${m.rankClass}">${m.name}</span> <span style="opacity:0.5">[${m.rankName}]</span></div><div>${m.text}</div>`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
    }
</script>
</body>
</html>
